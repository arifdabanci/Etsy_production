name: Etsy AI Lister
on:
  push:
    paths:
      - 'images/**'
  workflow_dispatch:

jobs:
  list_product:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11' # Desteklenen güncel sürüm
      - name: Install dependencies
        run: |
          pip install --upgrade google-genai requests
      - name: Run Agent
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          ETSY_KEYSTRING: ${{ secrets.ETSY_KEYSTRING }}
          ETSY_SHARED_SECRET: ${{ secrets.ETSY_SHARED_SECRET }}
          ETSY_SHOP_ID: ${{ secrets.ETSY_SHOP_ID }}
        run: python agent.py
