name: Etsy AI Lister
on:
  push:
    paths:
      - 'images/**' # Sadece images klasörüne bir şey eklenince çalışır

jobs:
  list_product:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'
      - name: Install dependencies
        run: |
          pip install --upgrade google-generativeai requests
      - name: Run Agent
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          ETSY_KEYSTRING: ${{ secrets.ETSY_KEYSTRING }}
          ETSY_SHARED_SECRET: ${{ secrets.ETSY_SHARED_SECRET }}
          ETSY_SHOP_ID: ${{ secrets.ETSY_SHOP_ID }}
        run: python agent.py
